name: CI Pipeline

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: statuspulse

    steps:
      # Step 1 — Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3 — Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      # Step 4 — Verify Docker
      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      # Step 5 — Run Ruff Lint
      - name: Run Ruff Lint
        run: |
          ruff check .

      # Step 6 — Install Hadolint
      - name: Install Hadolint
        run: |
          wget -O hadolint \
          https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64

          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/hadolint

      # Step 7 — Run Hadolint
      - name: Run Hadolint
        run: |
          hadolint Dockerfile

      # Step 8 — Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t statuspulse-app .

      # Step 9 — Start Docker Compose
      - name: Start Containers
        run: |
          docker compose up -d --build

      # Step 10 — Wait for App
      - name: Wait for Application
        run: |
          echo "Waiting for application startup..."
          sleep 20

      # Step 11 — Make Integration Script Executable
      - name: Set Execute Permission
        run: |
          chmod +x tests/test_integration.sh

      # Step 12 — Run Integration Tests
      - name: Run Integration Tests
        run: |
          ./tests/test_integration.sh

      # Step 13 — Show Container Logs on Failure
      - name: Show Docker Logs
        if: failure()
        run: |
          docker compose logs

      # Step 14 — Upload Artifacts
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: |
            statuspulse/docker-compose.yml

      # Step 15 — Shutdown Containers
      - name: Stop Containers
        if: always()
        run: |
          docker compose down
